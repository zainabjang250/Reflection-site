<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bathroom Mirrors - Luxury Collection</title>
    <style>
        body { background-color: #000; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; overflow-x: hidden; }
        
        /* Cart Badge */
        .cart-status { 
            position: fixed; top: 20px; right: 20px; background: #d4af37; color: black; 
            padding: 12px 25px; border-radius: 50px; font-weight: bold; z-index: 1000; 
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4); font-size: 1rem; cursor: pointer;
        }

        /* Sidebar Cart */
        .cart-sidebar {
            position: fixed; top: 0; right: -450px; width: 380px; height: 100%;
            background: #111; border-left: 2px solid #d4af37; z-index: 2001;
            transition: 0.4s; padding: 25px; color: white; overflow-y: auto;
            box-shadow: -10px 0 30px rgba(0,0,0,0.8);
        }
        .cart-sidebar.active { right: 0; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px; }

        .cart-item { display: flex; align-items: center; gap: 15px; background: #1a1a1a; padding: 12px; border-radius: 10px; margin-top: 15px; border: 1px solid #333; }
        .cart-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 5px; }

        h1 { text-align: center; color: #d4af37; font-size: 3.5rem; margin: 80px 0 40px; font-family: 'Georgia', serif; text-transform: uppercase; letter-spacing: 5px; }
        
        /* Grid Container - Fixed Side Spaces */
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 30px; 
            padding: 20px; 
            max-width: 1450px; 
            margin: 0 auto; 
        }
        
        @media (max-width: 1024px) { .grid-container { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 650px) { .grid-container { grid-template-columns: 1fr; } }

        /* Card Styling - Bold & Filled Look */
        .card { 
            background-color: #fff; padding: 12px; border-radius: 15px; 
            display: flex; flex-direction: column; transition: 0.4s; 
            justify-content: space-between; min-height: 620px;
            text-align: center; border: 1px solid #222;
        }
        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(212, 175, 55, 0.25); }
        
        /* Badi Picture */
        .card img { 
            width: 100%; 
            height: 380px; /* Kafi badi height taake card bhara lage */
            object-fit: cover; 
            border-radius: 10px; 
            cursor: zoom-in; 
            margin-bottom: 15px;
        }
        
        .description { font-size: 1.4rem; color: #111; font-weight: 800; margin: 10px 0; line-height: 1.2; }
        .price-row { margin: 10px 0 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .price { color: #b8860b; font-weight: 900; font-size: 1.6rem; }
        
        .specs-btn { 
            text-decoration: none; font-size: 0.85rem; color: #d4af37; border: 2px solid #d4af37; 
            padding: 8px 25px; border-radius: 6px; font-weight: bold; display: inline-block;
            transition: 0.3s; text-transform: uppercase;
        }
        .specs-btn:hover { background: #d4af37; color: #000; }

        .cart-btn { 
            background-color: #1a242f; color: white; border: none; padding: 18px; 
            cursor: pointer; font-weight: bold; text-transform: uppercase; border-radius: 10px; width: 100%; 
            transition: 0.3s; font-size: 0.9rem; letter-spacing: 1px;
        }
        .cart-btn:hover { background-color: #d4af37; color: black; }
        .cart-btn.added { background-color: #28a745 !important; color: white; cursor: default; }

        /* Full Screen Image Modal */
        .modal { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; }
        .modal-content { max-width: 85%; max-height: 85%; border: 2px solid #d4af37; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="cart-status" onclick="toggleCart()">🛒 My Cart: <span id="cart-count">0</span></div>

    <div id="cartSidebar" class="cart-sidebar">
        <div class="cart-header">
            <h2 style="color:#d4af37; margin:0;">Your Cart</h2>
            <span style="cursor:pointer; font-size:2.5rem; color:#fff;" onclick="toggleCart()">&times;</span>
        </div>
        <div id="cartItemsList">
            <p style="text-align:center; color:#666; margin-top:50px;">Your cart is empty</p>
        </div>
        <div style="margin-top:30px; font-weight:bold; border-top: 1px solid #333; padding-top:20px; text-align: center;">
            <div style="font-size: 1.1rem; color:#aaa; margin-bottom:5px;">Grand Total</div>
            <div id="cartTotal" style="color:#d4af37; font-size: 1.8rem;">Rs. 0</div>
            <button style="margin-top:20px; width:100%; padding:15px; background:#d4af37; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">CHECKOUT NOW</button>
        </div>
    </div>

    <h1>Luxury Mirrors</h1>

    <div id="imageModal" class="modal" onclick="closeModal()">
        <img class="modal-content" id="imgFull">
    </div>

    <div class="grid-container" id="productGrid"></div>

    <script>
        const mirrors = [
            { id: 1, name: 'LED Smart Anti-Fog Mirror', price: 3500, img: 'anti fog.jpg' },
            { id: 2, name: 'Luxury Oval Gold Mirror', price: 2500, img: 'gold mirror 2.jpg' },
            { id: 3, name: 'Modern Black Matte Mirror', price: 4000, img: 'mate mirror.jpg' },
            { id: 4, name: 'Wood Frame Mirror', price: 5500, img: 'wood mirror 5.jpg' },
            { id: 5, name: 'Round Backlit Mirror', price: 3800, img: 'round mirror 4.jpg' },
            { id: 6, name: 'Minimalist Silver Mirror', price: 1500, img: 'silver mirror.jpg' },
            { id: 7, name: 'Edge-to-Edge Polished Mirror', price: 1900, img: 'polished mirror.jpg' },
            { id: 8, name: 'Royal Antique Wood Mirror', price: 6200, img: 'royal mirror 2.jpg' },
            { id: 9, name: 'Brushed Nickel Large Mirror', price: 3300, img: 'large mirror.jpg' }
        ];

        let cart = [];
        const grid = document.getElementById('productGrid');

        // Loop through products
        mirrors.forEach(m => {
            grid.innerHTML += `
                <div class="card">
                    <img src="images/${m.img}" alt="${m.name}" onclick="openModal(this)">
                    <div>
                        <div class="description">${m.name}</div>
                        <div class="price-row">
                            <div class="price">Rs. ${m.price.toLocaleString()}</div>
                            <a href="Details-Bathroom.pdf" download class="specs-btn">View Details 📋</a>
                        </div>
                    </div>
                    <button class="cart-btn" id="btn-${m.id}" onclick="addToCart(${m.id})">Add to Cart</button>
                </div>`;
        });

        // Sidebar Toggle
        function toggleCart() { document.getElementById('cartSidebar').classList.toggle('active'); }

        // Add to Cart Logic
        function addToCart(id) {
            const item = mirrors.find(p => p.id === id);
            if (!cart.find(p => p.id === id)) {
                cart.push(item);
                updateCart();
                const btn = document.getElementById(`btn-${id}`);
                btn.innerText = "Item Added ✓";
                btn.classList.add('added');
                btn.disabled = true;
            }
        }

        // Remove from Cart
        function removeFromCart(id) {
            cart = cart.filter(p => p.id !== id);
            updateCart();
            const btn = document.getElementById(`btn-${id}`);
            if(btn) {
                btn.innerText = "Add to Cart";
                btn.classList.remove('added');
                btn.disabled = false;
            }
        }

        // Update Cart Display
        function updateCart() {
            const list = document.getElementById('cartItemsList');
            document.getElementById('cart-count').innerText = cart.length;
            
            if (cart.length === 0) {
                list.innerHTML = '<p style="text-align:center; color:#666; margin-top:50px;">Your cart is empty</p>';
                document.getElementById('cartTotal').innerText = `Rs. 0`;
                return;
            }

            list.innerHTML = '';
            let total = 0;
            cart.forEach(item => {
                total += item.price;
                list.innerHTML += `
                    <div class="cart-item">
                        <img src="images/${item.img}">
                        <div style="flex:1">
                            <div style="font-size:0.9rem; font-weight:bold; color:#fff;">${item.name}</div>
                            <div style="color:#d4af37; font-size:0.9rem; margin-top:3px;">Rs. ${item.price.toLocaleString()}</div>
                        </div>
                        <span style="color:#ff4444; cursor:pointer; font-size:1.8rem; font-weight:bold; padding-left:10px;" onclick="removeFromCart(${item.id})">&times;</span>
                    </div>`;
            });
            document.getElementById('cartTotal').innerText = `Rs. ${total.toLocaleString()}`;
        }

        // Modal Logic
        function openModal(el) { 
            document.getElementById("imageModal").style.display = "flex";
            document.getElementById("imgFull").src = el.src;
        }
        function closeModal() { document.getElementById("imageModal").style.display = "none"; }
    </script>
</body>
</html>
